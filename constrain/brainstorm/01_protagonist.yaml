# ============================================================
# Constrain — 主人公設定・信念体系
# ============================================================
# status: draft（マッキー読了前のブレインストーミング段階）
# story-compiler互換: templates/character-sheet.yaml
# ============================================================

character:
  name: ""  # 未定
  role: protagonist
  model_basis: "著者の自伝的要素（ただしADHD→ASD傾向に変換）"

  # ──────────────────────────────────────
  # 基本設定
  # ──────────────────────────────────────
  origin: >
    ASD傾向あり（作中では明示しない）。
    人々が共感していることを自分だけが分からず、
    地雷を踏んではいじめられてきた。
    頭は良く、理解力に優れている。

  livelihood: ""  # 後述のworld-settingsで分岐あり

  # ──────────────────────────────────────
  # 主人公モデル変数
  # ──────────────────────────────────────
  will: "極めて強い。自分を救うためなら人間の振る舞いを理論的に解析する執念がある"

  desire: >
    意識的欲望：世界を厳密に定義された言葉だけで構成し、
    誰にとってもバリアフリーな（再現可能な）コミュニケーションを実現すること

  unconscious_desire: >
    他者と真に繋がりたい。世界を旅したい。
    マイナスの解消だけでなくプラスの豊かさを味わいたい。
    ただし本人はこの欲望に気づいていない。
    「何のために生きてるの？」と問われて初めて瓦解する。

  object_of_desire: >
    表面的には「Constrain」（厳密な文章作成コンパイラ）の完成と普及。
    深層では、言葉を通じて他者の世界を旅し、抱擁すること。

  disposition: >
    論理的、分析的、正義感が強い。
    しかし「正しさ」を武器にしてしまう傾向がある。
    冷淡に見られるのは感情を知らないだけ。
    自分を守るために生きているが、それに気づいていない。

  # ──────────────────────────────────────
  # 共感ポイント
  # ──────────────────────────────────────
  empathy_hooks:
    - "空気が読めずにいじめられた原体験 → 読者は弱者として共感"
    - "母親の「努力しろ」に再現性がないことに気づく知性 → 知的共感"
    - "他者を理解しようとする真摯さ → 動機への共感"
    - "しかし手段が歪んで加害者になる → 痛みへの共感"

  # ──────────────────────────────────────
  # 中核信念体系（著者エピソードより）
  # ──────────────────────────────────────
  core_belief_system:
    mothers_core_concept: "努力"
    protagonists_core_concept: "再現性"

    origin_episode:
      description: >
        母親は「努力すればできる」と教えたが、
        その「努力」は無策に向き合い続けることを意味していた。
        ADHD（作中ではASD傾向）のある主人公には
        この方法に再現性がなかった。
      discovery: >
        カフェなら集中できることを発見。
        「集中は場所という変数に依存する」という法則を子供なりに見出す。
        → 再現性のある手段を確立することで適応していく。
      escalation: >
        自分だけでなく他者にも再現性を求めるようになる。
        「問題をたくさん解けばできるようになる」と宣う教師に疑問。
        実際には ①公式の記憶 ②適用判断 ③翻訳能力 のどれが欠けているかが問題。
        天才的直感でしか解けない方法は「解けていないのと同然」と見なす。
      completion: >
        再現性のある手段を言語化して伝えることが鍵だと確信。
        「言語は人と人がわかり合うために作り上げられた共通の架け橋」
        しかし言語は曖昧さを孕む → well-definedにしようと努める。

    belief_arc:
      phase_1:
        label: "自己救済としての再現性"
        content: "自分ができないことをできるようにするための再現可能な手段の確立"
      phase_2:
        label: "他者への普遍化"
        content: "自分以外にも通用する再現性、誰にとっても優しい言語の追求"
      phase_3:
        label: "排他的厳密さ"
        content: >
          曖昧さを嫌い、曖昧な表現をする人を不誠実（嘘つき・危険）とみなす。
          いけ好かないエリートになる。
      phase_4:
        label: "瓦解と再統合（ジンテーゼ）"
        status: "preferred"
        content: >
          Aの自殺（未遂）により、「厳密な言葉」が人を殺した事実に直面。
          一度は全てを否定しConstrainを撤廃するが、
          それにより現場が混乱し、社員から「ルールを戻してくれ」と懇願される。
          「構造（厳密さ）」は必要だが、それを「武器（処罰）」に使ったのが間違いだったと気づく。
          優しい厳密さへの統合。

  # ──────────────────────────────────────
  # 関係性
  # ──────────────────────────────────────
  relationships:
    - character: "A（いじめっ子 → 同僚/部下）"
      relation: "rival → 被加害者（自殺未遂） → 抱擁の対象"
      dynamic: >
        子供時代：主人公をいじめる。
        社会人時代：立場逆転、主人公がAを厳密な言葉で追い詰め、自殺に追い込んでしまう。
        最終的：主人公が自分の加害性に気づき、Aを受け入れる（あるいはAの不可逆な傷と向き合い続ける）。

    - character: "B（ヒロイン / クリエーター）"
      relation: "love / catalyst"
      dynamic: >
        主人公に曖昧さの価値を気づかせる存在。
        ただし「聖人すぎる舞台装置」にならないよう要深掘り。

    - character: "母親"
      relation: "origin / mentor_failed"
      dynamic: >
        「努力」を信奉する母が、主人公の「再現性」信仰の起点。
        キャラクターとして出すかは未定。

    - character: "理科系の先生（数学 or 物理）"
      relation: "mentor"
      dynamic: >
        言語による理解の美しさを教える。
        人間との繋がりが生じているのに、主人公はそこに気づかず
        言語のルール的側面だけを吸収してしまう。

  # ──────────────────────────────────────
  # 恋愛パターン（サブプロット候補）
  # ──────────────────────────────────────
  romance_pattern:
    status: candidate  # サブプロットとして採用するか未定
    description: >
      言語化能力の高さからメンヘラ気質の女性に好かれる。
      交際→強迫（彼女らの困難さを解決できない疲弊）→
      ドーパミン中毒（好きにならない人を振り向かせるゲーム）→
      深い関係の回避。寂しさに気づいてすらいない。
      「再現性と言語化でこれが合理的」と誤魔化す。
    bato_encounter: >
      Bは再現性がある言葉は使わないしめちゃくちゃだが居心地がいい。
      新たな発見をくれる。ドーパミン中毒にならず強迫も起こらない。
      Bも主人公の心根が優しいことに気づいている。
    note: >
      話が複雑になりすぎるなら削る候補。
      ただし主人公の「再現性への逃避」を描くには有効な装置。

  # ──────────────────────────────────────
  # 実体験素材ノート（ChatGPTスレッド由来）
  # source: 「感情と命令の対立」スレッド
  # ──────────────────────────────────────
  raw_material:

    - id: RM-001
      title: "正義ベースの命令 vs 交渉構造"
      source_thread: "感情と命令の対立"
      date: "2026-02-24"
      incident: >
        彼女が「親に家を借りているなら掃除するのが筋」と主人公に命令。
        主人公は無意識に語調が強くなった。
      protagonist_internal_structure: >
        反応トリガーは義務命令そのものではなく、
        価値観を根拠にした命令構造（正義化→命令→従わせる）。
        主人公が望んでいたのは感情負荷＋ポリシーに基づく「交渉構造」。
        命令構造 → 嫌悪 / 交渉構造 → 許容
      thematic_value:
        - "正義と言語の暴力性"
        - "命令と依頼の構文差"
        - "well-defined vs ill-defined の対立"
      connection_to_core_theme: >
        主人公は構造分解して説明しようとするが、
        彼女は「そこまで厳密に言語運用するのは無理」と限界を表明。
        精密言語が他者を追い詰める瞬間の具体例。

    - id: RM-002
      title: "解釈の決めつけと言語運用レベルの差"
      source_thread: "感情と命令の対立"
      date: "2026-02-24"
      incident: >
        彼女「結局母親に関する話だから感情的になったんでしょ」
        → 主人公の自己認識と不一致 → 強い違和感
      structural_analysis: >
        主人公: 命題レベルで分解し「〜と思う」で主観を明示
        彼女: 日常言語運用、厳密化に負荷を感じる
        ここには処理能力や誠実さの問題ではなく、
        抽象度の違いが存在する。
      narrative_potential: >
        主人公が「正しさ」を突きつけることで相手を追い詰める
        という繰り返しパターン。母親の叱責構造の再帰。

    - id: RM-003
      title: "最適化は暴力になるか"
      source_thread: "感情と命令の対立"
      date: "2026-02-24"
      incident: >
        彼女「歩み寄りたいと思って言ったのに、
        『掃除にかける工数を最小化したい』って言われたのが嫌だった」
      structural_conflict: >
        彼女のフレーム: 歩み寄り（関係）→ 気持ちの表明 → 受け止めてほしい
        主人公のフレーム: 問題発生 → リソース最適化 → 解決設計
        = 関係調整モード vs 最適化モード
      mother_recursion: >
        主人公は母親からの理不尽な叱責を重ねてイライラ。
        「合理化・構造化しようとする → 相手が冷酷と感じる
        → 人格否定の予感」という過去構造が再帰。
      thematic_value:
        - "最適化は暴力になるか"
        - "愛と効率の衝突"
        - "歩み寄りの定義のズレ"
        - "感情は'非効率'なのか"
        - "過去の叱責構造が現在に再帰する"
      key_moment: >
        主人公がイライラを爆発させず記録に回したこと
        = 「衝動」ではなく「観測」に回した瞬間。
        物語上、かなり重要な転換素子の候補。
      connection_to_core_theme: >
        核心テーマ「再現性・合理性は人を救うが、何かを奪う」
        と直結する素材。
