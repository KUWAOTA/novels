<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constrain — アイデアツリー</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0d1117;
            --bg-surface: #161b22;
            --bg-card: #1c2333;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --text-muted: #6e7681;
            --accent-preferred: #56d364;
            --accent-candidate: #d29922;
            --accent-deferred: #8b949e;
            --accent-rejected: #f85149;
            --accent-branch: #58a6ff;
            --accent-main: #bc8cff;
            --glow-preferred: rgba(86, 211, 100, 0.15);
            --glow-candidate: rgba(210, 153, 34, 0.15);
            --line-color: #30363d;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Sans JP', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* ── Header ── */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: linear-gradient(180deg, var(--bg) 0%, rgba(13, 17, 23, 0.95) 80%, rgba(13, 17, 23, 0) 100%);
            padding: 20px 32px 40px;
            pointer-events: none;
        }

        .header>* {
            pointer-events: auto;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 500;
            color: var(--text);
            letter-spacing: 0.5px;
        }

        .header h1 span {
            color: var(--accent-main);
            font-weight: 700;
        }

        .header .subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* ── Legend ── */
        .legend {
            position: fixed;
            top: 20px;
            right: 32px;
            z-index: 100;
            display: flex;
            gap: 16px;
            font-size: 11px;
            color: var(--text-dim);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        /* ── Canvas ── */
        .canvas-wrapper {
            width: 100%;
            height: 100%;
            overflow: auto;
            cursor: grab;
        }

        .canvas-wrapper:active {
            cursor: grabbing;
        }

        .canvas {
            position: relative;
            min-width: 3200px;
            min-height: 2400px;
            padding: 100px 60px 60px;
        }

        /* ── SVG lines ── */
        .lines-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .conn-line {
            stroke: var(--line-color);
            stroke-width: 2;
            fill: none;
            opacity: 0.6;
            transition: opacity 0.3s, stroke 0.3s;
        }

        .conn-line.highlight {
            stroke: var(--accent-branch);
            opacity: 1;
            stroke-width: 2.5;
        }

        /* ── Nodes ── */
        .node {
            position: absolute;
            z-index: 10;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.3s ease;
        }

        .node:hover {
            transform: scale(1.04);
            z-index: 20;
        }

        .node-inner {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 18px;
            min-width: 200px;
            max-width: 280px;
            position: relative;
            overflow: hidden;
        }

        .node-inner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            border-radius: 12px 0 0 12px;
        }

        .node.status-preferred .node-inner {
            border-color: rgba(86, 211, 100, 0.3);
        }

        .node.status-preferred .node-inner::before {
            background: var(--accent-preferred);
        }

        .node.status-preferred:hover .node-inner {
            box-shadow: 0 0 20px var(--glow-preferred);
        }

        .node.status-candidate .node-inner {
            border-color: rgba(210, 153, 34, 0.3);
        }

        .node.status-candidate .node-inner::before {
            background: var(--accent-candidate);
        }

        .node.status-candidate:hover .node-inner {
            box-shadow: 0 0 20px var(--glow-candidate);
        }

        .node.status-deferred .node-inner {
            border-color: rgba(139, 148, 158, 0.2);
            opacity: 0.7;
        }

        .node.status-deferred .node-inner::before {
            background: var(--accent-deferred);
        }

        .node.status-rejected .node-inner {
            border-color: rgba(248, 81, 73, 0.2);
            opacity: 0.5;
        }

        .node.status-rejected .node-inner::before {
            background: var(--accent-rejected);
        }

        .node.is-act .node-inner {
            background: linear-gradient(135deg, var(--bg-card), #1e2740);
            border-color: rgba(188, 140, 255, 0.3);
        }

        .node.is-act .node-inner::before {
            background: var(--accent-main);
        }

        .node.is-branch-root .node-inner {
            background: linear-gradient(135deg, var(--bg-card), #1c2b3a);
            border-color: rgba(88, 166, 255, 0.3);
        }

        .node.is-branch-root .node-inner::before {
            background: var(--accent-branch);
        }

        .node-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .node-label {
            font-size: 13px;
            font-weight: 500;
            line-height: 1.5;
            color: var(--text);
            margin-bottom: 6px;
        }

        .node-desc {
            font-size: 11px;
            line-height: 1.6;
            color: var(--text-dim);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .node-value {
            margin-top: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--accent-candidate);
            background: rgba(210, 153, 34, 0.08);
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
        }

        .node-status-badge {
            position: absolute;
            top: 8px;
            right: 10px;
            font-size: 9px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 2px 6px;
            border-radius: 3px;
        }

        .badge-preferred {
            background: rgba(86, 211, 100, 0.15);
            color: var(--accent-preferred);
        }

        .badge-candidate {
            background: rgba(210, 153, 34, 0.15);
            color: var(--accent-candidate);
        }

        .badge-deferred {
            background: rgba(139, 148, 158, 0.1);
            color: var(--accent-deferred);
        }

        .badge-rejected {
            background: rgba(248, 81, 73, 0.1);
            color: var(--accent-rejected);
        }

        .node-issue {
            margin-top: 6px;
            font-size: 10px;
            color: var(--accent-rejected);
            background: rgba(248, 81, 73, 0.08);
            padding: 4px 8px;
            border-radius: 4px;
            line-height: 1.5;
        }

        .node-issue::before {
            content: '⚠ ';
        }

        /* ── Detail Panel ── */
        .detail-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 200;
            background: linear-gradient(180deg, rgba(13, 17, 23, 0) 0%, var(--bg) 15%, var(--bg-surface) 100%);
            padding: 60px 32px 28px;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 45vh;
            overflow-y: auto;
        }

        .detail-panel.open {
            transform: translateY(0);
        }

        .detail-panel-close {
            position: absolute;
            top: 20px;
            right: 28px;
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .detail-panel-close:hover {
            background: var(--bg-card);
        }

        .detail-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .detail-header h2 {
            font-size: 16px;
            font-weight: 600;
        }

        .detail-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .detail-section h3 {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
        }

        .detail-section p {
            font-size: 13px;
            line-height: 1.7;
            color: var(--text-dim);
        }

        .detail-section .mono {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--accent-candidate);
        }

        /* ── Zoom controls ── */
        .zoom-controls {
            position: fixed;
            bottom: 20px;
            right: 28px;
            z-index: 150;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .zoom-btn {
            width: 36px;
            height: 36px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .zoom-btn:hover {
            background: var(--bg-card);
        }

        /* ── Branch label on lines ── */
        .branch-label {
            position: absolute;
            z-index: 5;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--accent-branch);
            background: var(--bg);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid rgba(88, 166, 255, 0.2);
            white-space: nowrap;
        }

        /* ── Animations ── */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .node {
            animation: fadeInUp 0.5s ease backwards;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1><span>Constrain</span> — アイデアツリー</h1>
        <div class="subtitle">🔄 girlfriend.md反映版 — 三角構造（恋人/主人公/いじめっ子）とクライマックス（抱擁）を追加。ノードをクリックして詳細を確認</div>
    </div>

    <div class="legend">
        <div class="legend-item">

        <div class="legend-item">

        <div class="legend-item">

            // ── COMMON RESOLUTION ──
            { id: 'resolution', label: '共通の到達点', desc: '再現性は間違いではない。物事はブーリアンではない。曖昧さにも価値がある。感情はノイズではない。Constrainも間違いではない。Aを行動原理レベルで理解し泣きながら抱擁', parent: null, status: 'preferred', type: 'resolution', x: 3200, y: 440 },
        ]; */

        // ═══════════════════════════════════════════════════════
        // RENDER
        // ═══════════════════════════════════════════════════════

        const canvas = document.getElementById('canvas');
        const svg = document.getElementById('linesSvg');
        const detailPanel = document.getElementById('detailPanel');
        const canvasWrapper = document.getElementById('canvasWrapper');

        // Calculate required canvas size
        let maxX = 0, maxY = 0;
        nodes.forEach(n => {
            if (n.x + 320 > maxX) maxX = n.x + 320;
            if (n.y + 200 > maxY) maxY = n.y + 200;
        });
        canvas.style.minWidth = (maxX + 100) + 'px';
        canvas.style.minHeight = (maxY + 100) + 'px';

        // Draw nodes
        const nodeElements = {};
        nodes.forEach((n, i) => {
            const el = document.createElement('div');
            const classes = ['node', `status-${n.status}`];
            if (n.type === 'act') classes.push('is-act');
            if (n.type === 'branch-root' || n.type === 'branch-point') classes.push('is-branch-root');
            el.className = classes.join(' ');
            el.style.left = n.x + 'px';
            el.style.top = n.y + 'px';
            el.style.animationDelay = (i * 0.03) + 's';
            el.dataset.id = n.id;

            let inner = `<div class="node-inner">`;
            inner += `<span class="node-status-badge badge-${n.status}">${n.status}</span>`;
            inner += `<div class="node-id">${n.id}</div>`;
            inner += `<div class="node-label">${n.label.replace(/\n/g, '<br>')}</div>`;
            inner += `<div class="node-desc">${n.description || n.desc || ''}</div>`;
            if (n.value) inner += `<div class="node-value">${n.value}</div>`;
            if (n.issue) inner += `<div class="node-issue">${n.issue}</div>`;
            inner += `</div>`;
            el.innerHTML = inner;

            el.addEventListener('click', () => showDetail(n));
            canvas.appendChild(el);
            nodeElements[n.id] = el;
        });

        // Draw connections
        function getNodeCenter(el) {
            const rect = el.getBoundingClientRect();
            const canvasRect = canvas.getBoundingClientRect();
            return {
                x: el.offsetLeft + el.offsetWidth / 2,
                y: el.offsetTop + el.offsetHeight / 2,
                right: el.offsetLeft + el.offsetWidth,
                left: el.offsetLeft,
                top: el.offsetTop,
                bottom: el.offsetTop + el.offsetHeight,
                width: el.offsetWidth,
                height: el.offsetHeight
            };
        }

        function drawLines() {
            // Wait for layout
            requestAnimationFrame(() => {
                svg.innerHTML = '';
                nodes.forEach(n => {
                    if (!n.parent) return;

                    const parents = Array.isArray(n.parent) ? n.parent : [n.parent];

                    parents.forEach(parentId => {
                        if (!nodeElements[parentId] || !nodeElements[n.id]) return;

                        const from = getNodeCenter(nodeElements[parentId]);
                        const to = getNodeCenter(nodeElements[n.id]);

                        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');

                        // Determine connection points
                        let x1, y1, x2, y2;
                        const dx = to.left - from.right;

                        if (dx > -20) {
                            // Target is to the right
                            x1 = from.right;
                            y1 = from.y;
                            x2 = to.left;
                            y2 = to.y;
                        } else if (to.top > from.bottom) {
                            // Target is below
                            x1 = from.x;
                            y1 = from.bottom;
                            x2 = to.x;
                            y2 = to.top;
                        } else {
                            x1 = from.right;
                            y1 = from.y;
                            x2 = to.left;
                            y2 = to.y;
                        }

                        const midX = (x1 + x2) / 2;
                        const d = `M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}`;
                        path.setAttribute('d', d);
                        path.classList.add('conn-line');
                        path.dataset.from = parentId;
                        path.dataset.to = n.id;

                        if (n.status === 'preferred') {
                            path.style.stroke = 'rgba(86,211,100,0.3)';
                        } else if (n.type === 'branch-root' || n.type === 'branch-point') {
                            path.style.stroke = 'rgba(88,166,255,0.3)';
                        }

                        svg.appendChild(path);
                    });
                });

                // Draw special connection: resolution
                const branchFc = nodeElements['FC-end'];
                const resolution = nodeElements['resolution'];
                if (branchFc && resolution) {
                    const from = getNodeCenter(branchFc);
                    const to = getNodeCenter(resolution);
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    const x1 = from.right; const y1 = from.y;
                    const x2 = to.left; const y2 = to.y;
                    const midX = (x1 + x2) / 2;
                    path.setAttribute('d', `M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}`);
                    path.classList.add('conn-line');
                    path.style.stroke = 'rgba(86,211,100,0.4)';
                    path.style.strokeDasharray = '6,4';
                    svg.appendChild(path);
                }
            });
        }

        setTimeout(drawLines, 100);
        window.addEventListener('resize', drawLines);

        // ═══════════════════════════════════════════════════════
        // DETAIL PANEL
        // ═══════════════════════════════════════════════════════

        function showDetail(node) {
            const panel = document.getElementById('detailPanel');
            const header = document.getElementById('detailHeader');
            const body = document.getElementById('detailBody');

            // Header color based on status
            const statusColors = {
                preferred: 'var(--accent-preferred)',

                deferred: 'var(--accent-deferred)',
                rejected: 'var(--accent-rejected)'
            };
            const color = statusColors[node.status] || 'var(--text)';

            header.innerHTML = `
                <div style="width:12px; height:12px; border-radius:50%; background:${color};"></div>
                <h2 style="margin:0; flex:1;">${escapeHtml(node.label.replace(/\n/g, ' — '))}</h2>
                <span class="mono" style="opacity:0.5; font-size:11px;">ID: ${node.id}</span>
            `;

            const desc = node.description || node.desc || 'No description.';

            body.innerHTML = `
                <div class="detail-section" style="grid-column: 1 / -1;">
                    <h3>Summary</h3>
                    <p style="font-size:14px; white-space: pre-wrap;">${escapeHtml(desc)}</p>
                </div>

                ${node.note ? `
                <div class="detail-section" style="grid-column: 1 / -1; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border);">
                    <h3>Detailed Notes</h3>

                </div>

                ${node.value ? `

                    <h3>Value Charge</h3>
                    <span class="node-value">${escapeHtml(node.value)}</span>
                </div>` : ''}
                ${node.value_change ? `

                    <span class="node-value" style="background:rgba(88,166,255,0.1); color:var(--accent-branch);">${escapeHtml(node.value_change)}</span>
                </div>` : ''}

                <div class="detail-section">
                    <h3>Status</h3>
                    <span class="node-status-badge badge-${node.status}" style="position:static;">${node.status}</span>
                </div>

                     <p style="font-size:11px; opacity:0.7;">Drag nodes to rearrange. Double click to edit text (Not implemented yet).</p>
                </div>

            panel.classList.add('open');

            // Highlight connected lines
            document.querySelectorAll('.conn-line').forEach(l => l.classList.remove('highlight'));
            document.querySelectorAll(`.conn-line[data-to="${node.id}"], .conn-line[data-from="${node.id}"]`).forEach(l => l.classList.add('highlight'));
        }

        // ── Connect Nodes (Right-Click Drag) ──
        let isConnecting = false;
        let connectStartNode = null;
        let tempLine = null;

        document.getElementById('canvas').addEventListener('contextmenu', e => {
            const node = e.target.closest('.node');
            if (node) {
                e.preventDefault(); // Prevent context menu on nodes
            }
        });

        // ── Drag and Drop Implementation ──
        let isDragging = false;
        let dragNode = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;

        document.getElementById('canvas').addEventListener('mousedown', e => {
            if (e.button === 2) { // Right click
                const node = e.target.closest('.node');
                if (node) {
                    isConnecting = true;
                    connectStartNode = node;

                    // Create temp line
                    tempLine = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    tempLine.classList.add('conn-line');
                    tempLine.style.stroke = 'var(--text-accent)';
                    tempLine.style.strokeDasharray = '5,5';
                    svg.appendChild(tempLine);
                    e.stopPropagation();
                }
            } else if (e.button === 0) { // Left click
                const potentialNode = e.target.closest('.node');
                if (potentialNode) {
                    isDragging = true;
                    dragNode = potentialNode;
                    const rect = dragNode.getBoundingClientRect();
                    dragOffsetX = e.clientX - rect.left;
                    dragOffsetY = e.clientY - rect.top;
                    dragNode.style.zIndex = 100;
                    e.stopPropagation();
                }
            }
        });

        document.addEventListener('mousemove', e => {
            const canvasRect = document.getElementById('canvas').getBoundingClientRect();
            const x = (e.clientX - canvasRect.left) / scale; // Adjust for scale if implemented, currently scale=1 logic needs verify
            const y = (e.clientY - canvasRect.top) / scale;

            if (isConnecting && connectStartNode) {
                const navScale = scale || 1; // Fallback
                // Update temp line
                const startRect = connectStartNode.getBoundingClientRect();
                const startX = (startRect.left + startRect.width / 2 - canvasRect.left) / navScale;
                const startY = (startRect.top + startRect.height / 2 - canvasRect.top) / navScale;

                const curX = (e.clientX - canvasRect.left) / navScale;
                const curY = (e.clientY - canvasRect.top) / navScale;

                const d = `M ${startX} ${startY} L ${curX} ${curY}`;
                tempLine.setAttribute('d', d);
            }

            if (isDragging && dragNode) {
                // Dragging logic
                const navScale = scale || 1;
                const newX = (e.clientX - canvasRect.left - dragOffsetX) / navScale;
                const newY = (e.clientY - canvasRect.top - dragOffsetY) / navScale;

                dragNode.style.left = `${newX}px`;
                dragNode.style.top = `${newY}px`;
                requestAnimationFrame(drawLines);
            }
        });

        document.addEventListener('mouseup', e => {
            if (isConnecting) {
                const targetNode = e.target.closest('.node');
                if (targetNode && targetNode !== connectStartNode) {
                    const parentId = connectStartNode.dataset.id;
                    const childId = targetNode.dataset.id;
                    console.log(`Connected ${parentId} to ${childId}`);
                    // In a real app, update data model here
                    const childData = nodes.find(n => n.id === childId);
                    if (childData) {
                        if (!childData.parent) childData.parent = parentId;
                        else if (Array.isArray(childData.parent)) childData.parent.push(parentId);
                        else childData.parent = [childData.parent, parentId];
                        drawLines();
                    }
                    alert(`Connected: ${parentId} -> ${childId}`);
                }

                if (tempLine) {
                    tempLine.remove();
                    tempLine = null;
                }
                isConnecting = false;
                connectStartNode = null;
            }

            if (isDragging) {
                isDragging = false;
                if (dragNode) dragNode.style.zIndex = '';

                // Update position data
                if (dragNode) {
                    const nodeId = dragNode.dataset.id;
                    const nodeData = nodes.find(n => n.id === nodeId);
                    if (nodeData) {
                        nodeData.x = parseInt(dragNode.style.left);
                        nodeData.y = parseInt(dragNode.style.top);
                    }
                }
                dragNode = null;
            }
        });

        // Click event for details (Separate from drag)
        document.getElementById('canvas').addEventListener('click', e => {
            const node = e.target.closest('.node');
            // Only show details if not just finished dragging/connecting
            if (node && !isDragging && !isConnecting) {
                const nodeId = node.dataset.id;
                const nodeData = nodes.find(n => n.id === nodeId);
                if (nodeData) showNodeDetail(nodeData);
            }
        });

        document.getElementById('detailClose').addEventListener('click', () => {
            detailPanel.classList.remove('open');
            document.querySelectorAll('.conn-line').forEach(l => l.classList.remove('highlight'));
        });

        // ═══════════════════════════════════════════════════════

        document.getElementById('zoomOut').addEventListener('click', () => setZoom(scale - 0.15));

        // 2. Logic
        function openEditor() {
            const select = document.getElementById('editParent');
            select.innerHTML = '';
            // Sort nodes by ID for easier finding
            const sorted = [...nodes].sort((a, b) => a.id.localeCompare(b.id));
            sorted.forEach(n => {
                const opt = document.createElement('option');
                opt.value = n.id;
                opt.textContent = `${n.id}: ${n.label.replace(/\\n/g, ' ')}`;

            updateIssueLink();
        }

        document.getElementById('editorClose').addEventListener('click', () => {
            editorPanel.classList.remove('open');
        });

        function generateYAML() {
            const id = document.getElementById('editId').value || 'NEW-ID';
            const label = document.getElementById('editLabel').value || 'タイトルなし';
            const desc = document.getElementById('editDesc').value || '';
            const parent = document.getElementById('editParent').value;
            const status = document.getElementById('editStatus').value;
            const value = document.getElementById('editValue').value;

            return `- id: ${id}\n  label: "${label}"\n  description: >\n    ${desc.replace(/\\n/g, '\\n    ')}\n  parent: "${parent}"\n  status: ${status}\n  type: beat${value ? `\n  value_change: "${value}"` : ''}`;
        }

        function updateIssueLink() {
            const yaml = generateYAML();
            const label = document.getElementById('editLabel').value || 'New Idea';
            const desc = document.getElementById('editDesc').value || '';
            const title = `[Idea]: ${label}`;
            const body = `新しいアイデアの提案です。\n\n\`\`\`yaml\n${yaml}\n\`\`\`\n\n**概要:**\n${desc}`;

            const btn = document.getElementById('btnIssue');
            btn.href = `https://github.com/KUWAOTA/novels/issues/new?title=${encodeURIComponent(title)}&body=${encodeURIComponent(body)}`;
        }

        document.getElementById('btnCopy').addEventListener('click', () => {
            const yaml = generateYAML();
            navigator.clipboard.writeText(yaml).then(() => {
                const btn = document.getElementById('btnCopy');
                const orig = btn.textContent;
                btn.textContent = '✅ Copied!';
                setTimeout(() => { btn.textContent = orig; }, 2000);
            });
        });

        ['editId', 'editLabel', 'editDesc', 'editParent', 'editStatus', 'editValue'].forEach(id => {
            document.getElementById(id).addEventListener('input', updateIssueLink);
            document.getElementById(id).addEventListener('change', updateIssueLink);
        });

        // Initial scroll to show root
        setTimeout(() => { canvasWrapper.scrollTo(0, 200); }, 200);
    </script>
</body>

</html>
