# ============================================================
# Module: Cast Design
# Source: Robert McKee "Story" / "Character" — キャスト設計
# Version: 1.0
# ============================================================
# キャスト（登場人物全体）は、主人公を取り巻く「太陽系」のように
# 設計されなければならない。
# 各キャラクターは、中心的なテーマ（統制概念）の異なる側面を
# 代表し、互いに衝突・反応することで物語を動かす。
# ============================================================

module_id: cast_design
module_name: "キャスト設計（Cast Design）"
source: "McKee 'Story' / 'Character'"

# ============================================================
# 定義：登場人物の存在価値
# ============================================================
# ユーザー定義:
# 「出来事」は「価値要素が変わる時間依存イベント」と定義される。
# (Module 01: Core Structure の "Value Change" と整合)

character_necessity:
  principle: >
    物語に登場するすべてのキャラクターは、構造的な機能を持たなければならない。
    機能とは「出来事（価値変化）を引き起こす」か、
    「出来事（価値変化）に反応する」ことである。
    観察するだけで反応しない、あるいは何も引き起こさないキャラは不要である。

# ============================================================
# キャスト構成（Polarity & Orchestration）
# ============================================================
cast_structure:
  polarity:
    description: >
      主要キャラクター間には「極性（Polarity）」が必要である。
      彼らが同じ状況に対して同じ反応をするなら、キャラが被っている。
      異なる反応、異なる意見、異なる行動原理を持たせること。

  orchestration:
    description: >
      キャストは中心的なテーマ（統制概念）に対して、
      肯定、否定、あるいは「否定の否定」など、
      多様な角度からの視点を提供するよう配置されるべき。

# ============================================================
# コンパイル検証ルール
# ============================================================
validation:

  # 1. 存在価値の証明（Action/Reaction）
  # ------------------------------------------------------------
  existence_justification:
    applies_to: All Characters (Cast)
    check:
      no_action_no_reaction_error:
        severity: compile_error
        condition: >
          Character does not CAUSE any Event (Value Change)
          AND
          Character does not REACT to any Event (Value Change)
        message: >
          キャラクター「{name}」の存在価値が証明されていません。
          このキャラクターは、出来事を引き起こす（Cause）ことも、
          出来事に反応する（React）こともしていません。
          構造的に機能しないキャラクターは削除するか、役割を与えてください。

  # 2. キャラクター重複（Cloning）検証
  # ------------------------------------------------------------
  character_cloning:
    severity: warning
    condition: >
      Two characters react to the same events in the same way,
      sharing the same vocabulary and attitude.
    message: >
      キャラクターの重複が疑われます。
      これらは同じ機能を持ったクローンです。
      一人に統合するか、極性（Polarity）を持たせて差別化してください。
