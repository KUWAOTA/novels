# ============================================================
# Module: Character Dimension
# Source: Robert McKee "Character" — 次元と矛盾
# Version: 1.0
# ============================================================
# マッキー『キャラクター』における「次元（Dimension）」の定義：
# 「次元とは、矛盾（Contradiction）である」
#
# キャラクターの深みは、特徴の数ではなく、
# 「一貫した矛盾」の存在によって生まれる。
# 表面的な特徴（Characterization）と、深層性格（True Character）の
# 間に矛盾があるとき、そのキャラクターは「次元がある」と言える。
# ============================================================

module_id: character_dimension
module_name: "キャラクターの次元（Character Dimension）"
source: "McKee 'Character'"

# ============================================================
# 次元設計（Designing Dimensions）
# ============================================================
dimension_structure:
  description: >
    キャラクターに次元を与えるには、矛盾する特性をペアで持たせる。
    この矛盾は、状況や圧力によって使い分けられるか、
    あるいは葛藤の源泉となるものでなければならない。

  # 矛盾のパターン
  contradiction_types:
    - surface_vs_deep:
        description: "外見/振る舞い（表）と 本性（裏）の矛盾"
        example: "見た目は天使だが、中身は悪魔"
    - role_vs_desire:
        description: "社会的役割と 個人的欲望の矛盾"
        example: "法を守るべき警官だが、法を破ってでも復讐したい"
    - trait_vs_trait:
        description: "性格特性同士の矛盾"
        example: "非常に知的だが、感情的には未熟"
    - past_vs_present:
        description: "過去の自分と 現在の自分の矛盾"
        example: "元平和主義者の殺人兵器"

# ============================================================
# 検証ルール（Validation Rules）
# ============================================================
validation_rules:

  # 1. 次元（矛盾）の必須性
  # ------------------------------------------------------------
  require_protagonist_dimension:
    applies_to: Character(protagonist)
    check:
      has_contradiction:
        severity: compile_error
        condition: "dimensions list is empty"
        message: >
          主人公に「次元（矛盾）」が定義されていません。
          魅力的で立体的なキャラクターには、少なくとも1つの
          明確な矛盾（Contradiction）が必要です。
          例: [表面: 冷酷な殺し屋] vs [深層: 植物を愛する心]

  # 2. 矛盾の証明（Show, Don't Tell）
  # ------------------------------------------------------------
  dimension_revelation:
    description: >
      設定された矛盾は、物語の中で「圧力（Pressure）」がかかった時に
      選択（Choice）を通じて証明されなければならない。
    
    check:
      proven_under_pressure:
        severity: warning
        condition: "contradiction defines but no scene reveals it"
        message: >
          設定された矛盾が、具体的なシーンでの選択として描かれていません。
          「説明」だけでは次元になりません。圧力をかけて矛盾を露呈させてください。

  # 3. キャストの次元
  # ------------------------------------------------------------
  require_antagonist_dimension:
    applies_to: Character(antagonist)
    check:
      has_contradiction:
        severity: warning  # 悪役は一次元的でも機能するが、多次元の方が強力
        condition: "dimensions list is empty"
        message: >
          敵対者に次元（矛盾）がありません。
          強力な敵対者は、しばしば魅力的な矛盾を持っています。
          （例: 非常に礼儀正しいサイコパス）

# ============================================================
# データ構造（Schema）
# ============================================================
schema:
  Character:
    dimensions:
      type: list
      item_structure:
        trait_a: "表面的な特性 / 一方の極 (例: 優しさ)"
        trait_b: "矛盾する特性 / もう一方の極 (例: 残虐性)"
        manifestation: "この矛盾がどのように表れるか (例: 動物には優しいが人間には冷酷)"
        revelation_scene_id: "この矛盾が露呈/証明されるシーンID"

# ============================================================
# 第三案生成ヒューリスティクス（Third-Option Generator）
# Source: McKee "Character" — 創造力の章
# ============================================================
# 注意: これは制約（満たさないとエラー）ではなく、
# ヒューリスティクス（提案ルール）である。
# 「第三のもの」は創造の本質ではなく、
# 「創造を起こしやすくする代表的な生成パターン」として扱う。
# ============================================================
third_option_generator:
  purpose: >
    対立する二項（A vs B）が提示されているとき、
    AかBのどちらかにしか振れていない場合に
    第三の選択肢を生成するよう提案する。
    矛盾の同居からキャラクターとドラマを立体化する。

  why_it_works:
    - "二項を立てる → 判断の軸ができる（鑑識眼の対象が明確になる）"
    - "両方を同居させる → 葛藤が内在化され、行為に燃料が入る"
    - "第三を探す → テンプレ回避になる（どちらかに寄せると既視感が出やすい）"

  applies_to:
    - Character(choice)
    - DecisionPoint
    - Action

  heuristic_checks:

    binary_only_action:
      description: >
        対立軸が提示されているのに、
        行為がAかBのどちらかにしか振れていない場合。
      severity: info
      message: >
        対立軸（A vs B）が設定されていますが、
        行為がどちらか一方にしか振れていません。
        第三の行為案を最低1つ生成してみてください。
        （採用は任意です）

    compromise_warning:
      description: >
        第三案が折衷（A/Bの半々）になっている場合。
      severity: info
      message: >
        第三案が「折衷（半々）」になっています。
        折衷は既視感のリスクがあります。
        A/Bの両方を同時に成立させる新しい具体を検討してください。

    third_option_without_function:
      description: >
        第三案が物語機能を満たしていない場合
        （因果を進めない/価値が動かない）。
      severity: info
      message: >
        第三案は生成されましたが、物語機能が不明確です。
        因果を前に進めるか、価値を動かすか確認してください。

  notes:
    enforcement_level: info_only
    rationale: >
      生成（アイデア出し）には使うが、採用条件にはしない。
      創作は単純化・極端化が効く局面も多く、
      第三案の強制はそれを潰すリスクがある。

# ============================================================
# ヒント
# ============================================================
tips:
  - "3次元、4次元のキャラクターとは、3つ、4つの矛盾を抱えていることを意味する。"
  - "最も強力な矛盾は、キャラクターの「善の中心」と対立するものかもしれない。"
  - "矛盾がないキャラクターは、どんなに風変わりな特徴を持っていても『平坦（Flat）』である。"
  - "二項対立の「第三のもの」は本質ではないが、キャラとドラマを生む強力な問いの立て方である。"
