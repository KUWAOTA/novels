# ============================================================
# Module: Protagonist Model
# Source: Robert McKee "Story" — 主人公設計 + "Character" — 欲求と動機
# Version: 0.3
# ============================================================
# 主人公は物語のエンジン。
# 意志（will）と欲望（desire）が行動を駆動し、
# 読者の共感（empathy）が物語への没入を保証する。
# 
# v0.3: McKee "Character" より以下を追加
#   - 自己の4層構造（圧力モデル）
#   - 主人公の8つの素質（未定義チェック）
#   - 性格描写の3つの役割
#   - 象徴化過剰チェック
#   - サブプロット主人公チェック
# ============================================================

module_id: protagonist
module_name: "主人公モデル（Protagonist Model）"
source: "McKee 'Story' + 'Character'"

# ============================================================
# 必須変数
# ============================================================
variables:
  will:
    required: true
    type: string
    description: >
      主人公の意志力。困難に直面したときに行動を起こす力。
      弱すぎるとantiplot（受動的主人公）になる。

  desire:
    required: true
    type: string
    description: >
      意識的な欲望。主人公が物語中で追い求めるもの。
      例: 「殺人犯を見つけたい」「彼女を取り戻したい」

  unconscious_desire:
    required: false
    type: string
    description: >
      無意識の欲望。主人公自身が気づいていない本当の欲求。
      例: 「父に認められたい」（表面的には独立を求めているが）
      定義すると物語に深みが出る。

  object_of_desire:
    required: true
    type: string
    description: >
      欲望の対象。具体的に何を手に入れようとしているか。
      例: 「真犯人の正体」「失われた指輪」

  disposition:
    required: true
    type: string
    description: >
      内面的傾向/性格。主人公がどのように世界と関わるか。
      例: 「注意深いが臆病」「衝動的だが誠実」

# ============================================================
# 共感チェック
# ============================================================
empathy_check:
  description: >
    読者が主人公に十分に共感できるか。
    共感 ≠ 好感。読者が主人公を「理解」できれば十分。
  low_empathy:
    severity: warning
    message: "読者の共感ポイントが不足している可能性があります"
  check_items:
    - "読者が主人公の動機を理解できるか"
    - "主人公に人間的な弱さや矛盾があるか"
    - "主人公のリスクが読者に伝わるか"

# ============================================================
# 善の中心（Good Center Requirement）
# ============================================================
good_center_requirement:
  purpose: >
    主人公は道徳的整合性に関わらず、
    観客の共感を可能にする「善の中心」（ポジティブな核心的価値/資質）
    を持たなければならない。

  applies_to:
    - Character(protagonist)
    - Story

  required_arguments:
    good_center:
      description: >
        観客が感情的に掴める正の核心特性/価値。
        例: 忠誠心、愛情、勇気、脆さ、誠実さ
    evidence_scenes:
      description: >
        good_center が行動/反応を通じて「示される」シーンのID。
        テキストとして「説明」されるのではなく。

  compile_time_checks:

    missing_good_center:
      action: warning
      message: >
        主人公に明確な「善の中心」がありません。
        共感/エンゲージメントのリスクがあります。

    told_not_shown_good_center:
      action: warning
      message: >
        善の中心が行動ではなく説明として提示されています。
        行動/反応を通じて示してください。

    good_center_contradiction_without_cost:
      description: >
        主人公が善の中心に反する行動をした場合、
        代償/罪悪感/影響がなければ一貫性を損なう。
      action: warning
      message: >
        善の中心の違反に代償がありません。一貫性のリスク。

# ============================================================
# 心性と感情の連動
# ============================================================
mentality_linkage:
  description: >
    主人公の感情反応は心性（mentality, global_settingsで定義）から
    導出されなければならない。感情が心性と無関係に変動する場合は警告。
  rule: >
    感情評価は mentality_first の原則に従う。
    心性 → 世界認知 → 状況解釈 → 感情反応 の順序で導出する。
  check:
    emotion_detached_from_mentality:
      severity: warning
      message: >
        主人公の感情反応が心性と整合していません。
        心性から遡って感情を再評価してください。

# ============================================================
# 自己の4層構造 — 圧力モデル（McKee "Character"）
# ============================================================
# v0.2の「表/裏の2層」を「4層の圧力構造」に拡張。
# 通常時は内層が外層を決定し、
# 危機（圧力）下では外層から順に剥がれ最深部が露出する（劇的露出モデル）。
# ============================================================
self_layers:
  description: >
    キャラクターは単層ではなく、社会的仮面から無意識までの
    "圧力構造"を持つ。通常時は隠れた自己→中核→個人→社会の
    順で決定されるが、ドラマでは逆方向に剥離が起きる。
  model: pressure  # 因果モデルではなく劇的露出モデル

  layers:
    social_self:
      order: 1  # 最外層
      type: string
      required: false
      description: >
        公的役割・職業・肩書き・他者から見える人格。
        世界に対する表面出力。
    personal_self:
      order: 2
      type: string
      required: false
      description: >
        親密な関係（恋人・家族・親友）で見せる顔。
        限定された他者への出力。
    core_self:
      order: 3
      type: string
      required: false
      description: >
        信念・価値観・恐れ・欲望。
        行動選択アルゴリズム。
    hidden_self:
      order: 4  # 最深層
      type: string
      required: false
      description: >
        本人も知らない衝動・抑圧された欲望・否認している価値観。
        中核を書き換える潜在変数。

  pressure_design:
    description: >
      「どの圧力でどの層が破れるか」を設計する。
      これが物語エンジンになる。
    fields:
      pressure_sequence:
        type: list
        required: false
        description: >
          圧力による層の剥離順序。
          例: ["Act1: 社会的自己の崩壊", "Act2: 個人的自己の崩壊",
               "Act3: 中核の揺らぎ → 隠れた自己の露出"]

  compile_time_checks:
    layers_undefined:
      severity: info
      condition: "fewer than 2 layers defined"
      message: >
        自己の層が2層未満しか定義されていません。
        最低でも社会的自己と中核の自己を設計すると深みが出ます。
    hidden_self_unused:
      severity: info
      condition: "hidden_self undefined"
      message: >
        隠れた自己が未定義です。決定的啓示の根拠として、
        本人も気づいていない衝動や欲望を設計すると転換が強くなります。
    no_pressure_sequence:
      severity: warning
      condition: "self_layers defined but pressure_sequence undefined"
      message: >
        自己の4層は定義されていますが、圧力による剥離順序が未定義です。
        「どの危機でどの層が破れるか」を設計してください。

# ============================================================
# 性格描写の3つの役割（McKee "Character"）
# ============================================================
characterization_roles:
  description: >
    性格描写には3つの構造的役割がある。
    これらが欠けるとキャラクターが機能不全を起こす。
  roles:
    credibility:
      description: >
        信頼性 — 行動と内面が整合していると読者が感じられる状態。
        性格描写がないと行動は「作者の都合」に見える。
        性格描写は未来の選択を"予告"する装置。
      check: "行動根拠が設計されているか"
    uniqueness:
      description: >
        個性 — 他の登場人物と交換不能であること。
        「奇抜さ」ではなく「固有の矛盾」が個性を作る。
      check: "他キャラと交換可能になっていないか"
    curiosity:
      description: >
        好奇心 — 読者に「まだ見ていない側面がある」と感じさせること。
        未開示の層。4層構造の段階的露出と直結する。
      check: "未開示情報が設計されているか"

  compile_time_checks:
    credibility_weak:
      severity: warning
      message: >
        主人公の行動が性格設計から自然に導出されていません。
        「この人ならこの選択をする」と読者が思えるか確認してください。
    uniqueness_weak:
      severity: info
      message: >
        主人公が他キャラクターと交換可能な状態です。
        固有の矛盾や癖を追加してください。
    curiosity_depleted:
      severity: warning
      message: >
        主人公の未開示情報が枯渇しています。
        読者の好奇心を維持するための「隠された層」を確保してください。

# ============================================================
# 信憑性制約 — 潜在可能性モデル（McKee "Character"）
# ============================================================
credibility_constraint:
  description: >
    決定的啓示（キャラクターの転換点）が成立するための制約。
    信憑性は「連続性」ではなく「潜在可能性の存在」で担保される。
    突然に見える転換でも、伏線として「隠れた自己」が布線されていれば成立する。
  principle: >
    読者が「ああ、もともとこうなる可能性はあった」と感じられるか。
    主人公を「思想の装置」にせず「思想に振り回される人間」として描く。
  fields:
    latent_potential:
      type: string
      required: false
      description: >
        転換を支える潜在的可能性。
        本人が否認しているが微細に存在する感覚。
        例: 「再現性では満たされない感覚が以前から微細にある」
  compile_time_checks:
    revelation_without_potential:
      severity: compile_error
      condition: "decisive revelation exists but latent_potential undefined"
      message: >
        決定的啓示に対する潜在可能性が未定義です。
        転換前に伏線（隠れた自己の布線）がなければ、
        読者は「作者が思想を変えさせただけ」と感じます。

# ============================================================
# 主人公の8つの素質 — 未定義チェック（McKee "Character"）
# ============================================================
# エラーにはしない。「設計の抜け漏れ検出」が目的。
# 「欠けている」と「意図的に弱い」は違う。
# 段階化: A=warning（推進力）、B=info-high（読者接続）、C=info（深み）
# ============================================================
protagonist_traits:
  description: >
    マッキーの8つの素質を「必須条件」ではなく「未定義チェック」として実装。
    目的は「何も考えていない項目があるか？」の検出。
    各項目の状態: 0=未定義, 1=意図的に弱い, 2=明確に強い
  traits:
    willpower:
      label: "意志の力"
      level: A  # 物語の推進力として不可欠
      severity_if_undefined: warning
      description: "困難に直面しても行動を起こす力"
    complexity:
      label: "複雑さ"
      level: B
      severity_if_undefined: info
      description: "単純な善悪ではない多層性"
    facets:
      label: "多面性"
      level: B
      severity_if_undefined: info
      description: "場面・関係性によって異なる顔を見せること"
    empathy:
      label: "感情移入できる"
      level: B
      severity_if_undefined: info
      description: "読者が共感（理解）できるポイント"
    curiosity_inducing:
      label: "好奇心を掻き立てる"
      level: C
      severity_if_undefined: info
      description: "まだ知らない側面があると感じさせる力"
    interior_depth:
      label: "豊かな内面"
      level: C
      severity_if_undefined: info
      description: "表面に出ない思考・感情・記憶の厚み"
    adaptability:
      label: "変化への対応力"
      level: C
      severity_if_undefined: info
      description: "危機に際して変容する能力（意図的に低いも設計として有効）"
    truth_perception:
      label: "真実を見抜く力"
      level: C
      severity_if_undefined: info
      description: "状況の本質を見通す力（低いことも物語装置になる）"

  compile_time_checks:
    trait_undefined:
      severity: "per-trait (A=warning, B/C=info)"
      condition: "trait state == 0 (undefined)"
      message_template: >
        主人公の「{trait_label}」が設計上未定義です。
        意図的に弱い場合は intentional_weak: true を設定してください。

# ============================================================
# 象徴化過剰チェック（McKee "Character"）
# ============================================================
symbolism_overload_check:
  description: >
    主人公の資質が象徴的方向に膨らむほど、信憑性が失われる。
    象徴化のしすぎ = 人間ではなく「理念」「記号」になること。
    × 象徴を作ってから人間を貼る
    ○ 人間を描いたら結果的に象徴に見える
  principle: >
    主人公は理念の看板ではない。行動する人間だ。
    「思想の装置」ではなく「思想に振り回される人間」であること。
  human_elements:
    - "感情でブレる瞬間"
    - "矛盾を抱えている"
    - "自分の理論を守るために非合理なことをする"
    - "欠点がある"
    - "制限がある"
  compile_time_checks:
    symbolism_overload:
      severity: info
      condition: >
        protagonist traits are highly aligned without contradictions,
        no human_elements defined or all traits at level 2
      message: >
        主人公の資質が理念的に整理されすぎています。
        具体的な矛盾・制限・失敗経験を追加すると信憑性が増します。
        「思想の装置」ではなく「思想に振り回される人間」を描いてください。

# ============================================================
# サブプロット主人公チェック（McKee "Character"）
# ============================================================
# 未定義ならINFOヒントを出す（best-effort要素）
# ============================================================
subprotagonist_check:
  description: >
    サブプロット主人公（B主人公）を作った際の、
    ベター要素の未定義検出。欠けていてもエラーにはしない。
  fields:
    link_to_main:
      type: enum
      values: [mirror, contrast, complement, interference]
      description: "主プロットとの関係タイプ（鏡像/対照/補完/干渉）"
    desire:
      type: string
      description: "B主人公の欲望（主主人公と独立していること）"
    conflict:
      type: string
      description: "外的葛藤＋内的葛藤のどちらか最低1つ"
    arc:
      type: string
      description: "変化する/変化しない（硬直も設計としてOK）を明示"
    theme_function:
      type: string
      description: "テーマを別角度から照らす役割"
    intersection:
      type: string
      description: "主プロットへの影響点（いつ・何を・どう変えるか）"
    ending:
      type: string
      description: "サブプロットの終点（合流/決裂/置き去り/反転）"
    credibility_root:
      type: string
      description: "行動の根（潜在可能性の根拠：過去・習慣・価値観）"

  compile_time_checks:
    subprotagonist_field_undefined:
      severity: info
      condition: "subprotagonist declared but field undefined"
      messages:
        link_to_main: >
          サブ主人公の「主プロットとの関係タイプ」が未定義です。
          鏡像/対照/補完/干渉のどれかを設計すると収束が強くなります。
        desire: >
          サブ主人公の「欲望」が未定義です。
          主人公と同じ目的だと駒化しやすいので、独立目的を設計してください。
        intersection: >
          サブプロットの「交差点」が未定義です。
          主プロットの選択を変える圧力/情報/代償のどれを渡すか決めてください。
        credibility_root: >
          サブ主人公の「信憑性の根」が未定義です。
          その人物がその選択をする潜在可能性の根拠を設計してください。

# ============================================================
# 敵対力制約（Antagonistic Force Constraint）
# ============================================================
antagonistic_force_constraint:
  purpose: >
    消極的・惰性的な主人公が行動を起こすには、
    十分な敵対的圧力（外部からの強制力）が必要。
    行動は「性格 × 圧力」の関数である。
    圧力が低いなら行動は嘘になる。

  applies_to:
    - Story
    - Act
    - Scene
    - Action

  protagonist_profile:
    required_declaration:
      baseline_drive_level:        # high | medium | low
        type: enum
        values: [high, medium, low]
        description: "主人公の基本的な行動駆動レベル"
      avoidance_tendency:          # high | medium | low
        type: enum
        values: [high, medium, low]
        description: "主人公の回避傾向"

  antagonistic_force:
    layers:
      - internal        # 恐れ・欠落・欲望
      - interpersonal   # 人間関係的圧力
      - social          # 制度・集団・権力
    required_arguments:
      force_magnitude:          # numeric 0.0 - 1.0
        type: float
        range: "0.0 - 1.0"
      escalation_curve:         # increasing | static | decreasing
        type: enum
        values: [increasing, static, decreasing]

  validation_logic:
    condition: >
      if protagonist_profile.baseline_drive_level == low
         or protagonist_profile.avoidance_tendency == high
      then required_force_threshold: 0.7
      else required_force_threshold: 0.4

  compile_time_checks:

    insufficient_antagonistic_pressure:
      description: >
        消極的主人公なのに敵対力が閾値を超えていない場合、
        行動が動機づけ不足に感じられる。
      action: compile_error
      message: >
        敵対力が消極的主人公の行動を正当化するには不十分です。

    no_escalation_detected:
      description: >
        敵対力が時間経過で上昇しない場合、
        主人公の行動が停滞する。
      action: warning
      message: >
        敵対力にエスカレーションがありません。
        増大する圧力で苦闘を正当化してください。

    no_reckless_struggle_detected:
      description: >
        低駆動の主人公には少なくとも1つのフェーズで
        圧力下の不釣り合いな/無謀な行動が必要。
      action: warning
      message: >
        消極的主人公に敵対的圧力下での
        無謀なもがきが見られません。

# ============================================================
# スコープ
# ============================================================
scope:
  global_or_time_dependent: undecided
  note: >
    主人公の性格は物語を通じて固定か、変化するか。
    4層構造の圧力設計と連動して検討する。

# ============================================================
# 制作時の運用原則（McKee "Character"）
# ============================================================
# コンパイラのルールではなく、執筆モードでの指針。
# ============================================================
writing_guidance:
  scene_level_check: >
    シーンを書く前に考えるのは3つだけ:
    1. この行動はその人の性格から自然か？（信頼性）
    2. 他のキャラでも代替できないか？（個性）
    3. まだ読者が知らない面は残っているか？（好奇心）
  internal_conflict_first: >
    外側の事件より内側の衝突を先に設計する。
    「この場面で主人公の中で何と何がぶつかっているか？」
  anti_symbolism: >
    創作時に"象徴を作ろう"と考えないこと。
    人間を書けば結果として象徴になる。逆にやると信憑性が死ぬ。
    理念を削る → 反応を書く → 矛盾を書く。
    「思想の説明」ではなく「思想に振り回される瞬間」を書く。

# ============================================================
# 内から生じる動機タクソノミー（Inner Motivation Taxonomy）
# Source: McKee "Character" p151
# ============================================================
inner_motivation_taxonomy:
  purpose: >
    主人公を行動へと駆り立てる「内から生じる動機」の分類。
    desire フィールドを設計する際のヒントとして提示する。
    これらは相互に重複・複合しうる。
  motivations:
    - eternal_life:       "永遠の命への欲求"
    - survival:           "生存への欲求"
    - balance:            "バランス（例：正義/不正義の価値要素が-に傾くと復讐をするなど）"
    - pleasure:           "快楽"
    - sex:                "セックス"
    - power:              "権力"
    - empathy:            "共感（理解されたい・繋がりたい）"
    - desire:
        subtypes:
          - greed:        "貪欲"
          - envy:         "羨望"
          - jealousy:     "嫉妬"
    - curiosity:          "好奇心"
    - meaning:            "意味（人生に意味を与えたいなどの願望）"
    - fulfillment:        "充足感"
    - transcendence:      "超越した存在への願望"
  hint: >
    欲求を一文で定義すること。
    例：「完全に理解されたい」「曖昧さを排除したい」「世界を再現可能にしたい」

# ============================================================
# 条件 vs 欲求の区別（Condition vs. Desire）
# Source: McKee "Character" — 欲求がエンジン
# ============================================================
condition_vs_desire:
  principle: >
    社会的状況や環境は「原因」ではなく「条件」。
    キャラクターを動かすのは、あくまで欲求（desire）である。
    貧困は犯罪の「原因」ではない。犯罪を選ぶのはキャラクター。
    同じ条件でも選択が異なるのがキャラクターの性格を立ち上げる。

  chain:
    - step: condition
      description: "外的条件（家庭・文化・時代・圧力）→ 行動を決定しない"
    - step: desire
      description: "内的欲求（何を欲しているか）→ 行動のエンジン"
    - step: choice
      description: "選択→ 性格が現れる"

  design_steps:
    step1: "条件を書き出す（家庭・文化・時代・圧力）"
    step2: "それとは独立に「欲求」を一文で書く"
    step3: "同じ条件で別の選択肢も考える（逃げる/迎合する/暴力化する/笑いに変えるなど）。その中でこのキャラクターはどれを選ぶか。そこが性格。"

  compile_time_checks:

    desire_conflated_with_condition:
      description: >
        欲求が「〇〇な環境だったからこうなった」という因果説明になっている場合。
      severity: warning
      message: >
        欲求が環境条件の説明になっています。
        「〇〇な家庭で育ったからこうなった」はドラマではなく説明です。
        条件から独立した欲求を一文で定義してください。
        (McKee: Conditions are not causes; desire is the engine.)

    desire_undefined:
      description: >
        主人公の欲求（desire）が未定義の場合。
      severity: compile_error
      message: >
        主人公の欲求（desire）が定義されていません。
        欲求がなければ行動の根拠がなく、物語が動きません。

    thought_novel_weak_desire:
      description: >
        思想系・テーマ主導の小説で、条件説明が多く欲求が弱い場合。
        人物が「論文の例」になるリスク。
      severity: warning
      message: >
        思想系作品で欲求の定義が弱い傾向があります。
        条件の説明が多く、欲求が薄いと人物は「論文の例」になります。
        欲求が明確なとき、思想は行動に変わります。

