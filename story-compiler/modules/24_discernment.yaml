# ============================================================
# Module: Discernment (鑑識眼)
# Source: Robert McKee "Character" — 鑑識眼の章
# Version: 1.0
# ============================================================
# 鑑識眼とは「安っぽさ／嘘／腐り」を直感で嗅ぎ分けて
# 妥協しない感度と判断力のこと。
# 批評家目線ではなく、自作の品質管理のための目。
# "欠陥検出 → 削除" の回路として機能する。
# ============================================================

module_id: discernment
module_name: "鑑識眼（Discernment — 品質検査）"
source: "McKee 'Character' — 鑑識眼の章"

# ============================================================
# 核心原則
# ============================================================
core_principles:
  - principle: "嫌悪感が品質の検出器"
    description: >
      「なんかこれ嘘くさい」「安い」「死んでる」
      と感じるセンサーが品質の基盤。不快さに鈍いと
      欠陥を放置して完成扱いしてしまう。

  - principle: "欠点検出→削除の回路"
    description: >
      自分が書いたページにある欠点をなるべく多く見つけ、
      嫌悪感をいだいてそれらをごみ箱行きにすることで
      欠点を減らす。鑑識眼 = 品質管理回路。

  - principle: "最大の欠陥は内面の嘘（self-deception）"
    description: >
      誠実に書いてるつもりでも、自分に都合のいい理解で
      世界や人間を描くと、作品に"嘘"が混ざる。
      台詞や展開の安さより深いところで作品を壊す。

  - principle: "フィクションの機能 = 現実と虚構のズレを浮き彫りにする"
    description: >
      良い物語は現実をそのまま写すのではなく、
      虚構を通して現実の矛盾や罪深さを見える形にする。

# ============================================================
# 検出パターン（Staleness Indicators）
# ============================================================
staleness_detection:
  description: >
    以下のパターンは「陳腐さ」「嘘」「生命の欠如」の兆候。
    鑑識眼チェックとして自作検証時に適用する。

  patterns:

    formulaic_role:
      label: "紋切り型の役柄"
      description: "役割・属性がテンプレのまま動いていないか"
      examples:
        - "冷酷だが実は優しいだけのツンデレ"
        - "悪役が悪いだけの存在"
        - "賢者が情報を渡すだけの機能"
      severity: warning
      message: >
        紋切り型の役柄が検出されました。
        キャラクターがテンプレートとして機能しているだけで、
        行動が予定調和になっていないか確認してください。

    contrived_dialogue:
      label: "鼻につく台詞"
      description: "説明臭い・決め台詞臭い・作者の手が見える台詞"
      examples:
        - "状況を説明するためだけの台詞"
        - "テーマを直接言語化する台詞"
        - "感情を直接ラベリングする台詞"
      severity: warning
      message: >
        作為的な台詞が検出されました。
        説明・テーマ直接表現・感情ラベリングの疑いがあります。
        サブテキストで表現することを検討してください。

    lifeless_character:
      label: "生命が宿っていない"
      description: "人物が矛盾を抱えず、予定調和で動いている"
      check: >
        キャラクターが内部矛盾を抱えているか、
        予期しない選択をする場面があるかを確認。
      severity: warning
      message: >
        キャラクターに生命の兆候が不足しています。
        矛盾を抱える内面、予定調和を裏切る選択がありますか？

    authorial_dishonesty:
      label: "作者の嘘（自己欺瞞）"
      description: >
        作者が都合よく現実を単純化していないか。
        悪役の単純化、感情の単純化、原因の単純化。
      sub_checks:
        - villain_oversimplification: "悪役が「ただの悪」になっていないか"
        - emotion_oversimplification: "感情を単一ラベルで済ませていないか"
        - cause_oversimplification: "原因を一つに帰属させすぎていないか"
        - convenient_worldview: "作者に都合の良い世界観で描いていないか"
      severity: warning
      message: >
        作者の自己欺瞞（現実の単純化）の疑いがあります。
        悪役・感情・原因の複雑さが適切に描かれていますか？
        見たくないものも見て書く誠実さを確認してください。

    retained_for_comfort:
      label: "気持ちよさで残した文・場面"
      description: >
        削れるのに残しているもの。
        作者が気持ちいいから残している文・場面。
      severity: info
      message: >
        この文/場面は物語の因果・価値変化に寄与していますか？
        作者の満足のために残していないか検討してください。

# ============================================================
# 検証ルール（Validation Rules）
# ============================================================
validation:

  # 自作レビュー時の鑑識眼チェック
  discernment_review:
    applies_to:
      - Scene
      - Sequence
      - Act
      - Story
    description: >
      各構造単位のレビュー時に鑑識眼チェックリストを適用する。
      5つの検出パターンすべてを走査し、該当があれば報告。

  # "誠実さ"チェック（最重要）
  honesty_check:
    severity: warning
    applies_to:
      - Character
      - Scene
      - Story
    description: >
      物語全体で「作者の自己欺瞞」が混入していないか。
      これは全検出パターンの中で最も深刻な欠陥。
    message: >
      誠実さの検証: この物語は、作者が見たくない現実にも
      誠実に向き合っていますか？
      都合のよい単純化・理想化が混入していないか確認してください。

# ============================================================
# 創作支援提案（Info — 詰まった時の提案）
# ============================================================
creative_assistance:
  description: >
    作者がアイデアに詰まった時にのみ、info レベルで
    状況に応じた提案を行う。固定的なhow-toではなく、
    その場の最適手を提示する。
    ユーザー方針: 「手順を固定しない。詰まった時だけ提案」

  trigger_phrases:
    - "アイデアが出ない"
    - "ここから先が繋がらない"
    - "選択肢を出して"
    - "安い驚き回避"
    - "展開に詰まった"

  proposal_modes:
    generate_options:
      description: "制約を満たす選択肢を複数列挙する"
    connect_gap:
      description: "前後の因果を接続する中間案を提案する"
    anti_staleness:
      description: "陳腐回避の観点から代替案を提示する"
    pressure_design:
      description: "圧力を設計して選択を生み出す状況を提案する"

  severity: info
  note: >
    これは制約ではなくヒューリスティクス。
    強制せず、候補列挙として提示する。
